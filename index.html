<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ModifAI · Crédits & usages</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f1f5f9;color:#1e293b;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:14px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
.wrap{max-width:1280px;margin:0 auto;padding:0 16px}
.console{position:sticky;top:0;z-index:40;background:#0f172a;color:#e2e8f0;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.console-inner{max-width:1280px;margin:0 auto;padding:12px 16px}
.brand{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
.brand b{color:#fff;font-size:14px;letter-spacing:-.01em}
.brand .sub{font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:#a5b4fc}
.panel{border:1px solid rgba(51,65,85,.6);background:rgba(30,41,59,.4);border-radius:10px;padding:12px}
.panel-h{display:flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:10px}
.params{display:flex;flex-wrap:wrap;gap:14px 36px}
.prow-h{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#cbd5e1;margin-bottom:6px;display:flex;align-items:center}
.minis{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.mini{display:flex;flex-direction:column;align-items:flex-start}
.mini>span{font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:#64748b;margin-bottom:2px}
.num{width:80px;background:rgba(30,41,59,.8);border:1px solid #334155;border-radius:4px;padding:4px 6px;text-align:right;font-size:13px;color:#f1f5f9;font-family:ui-monospace,monospace}
.num.sm{width:60px}
.num:focus{outline:none;border-color:#818cf8;box-shadow:0 0 0 1px #818cf8}
.suf{margin-left:4px;font-size:11px;color:#94a3b8;font-family:ui-monospace,monospace}
.inline{display:inline-flex;align-items:center}
.tip{position:relative;display:inline-flex;align-items:center;margin-left:4px;vertical-align:middle;cursor:help}
.tip .ic{width:12px;height:12px;color:#94a3b8}
.tip:hover .ic{color:#818cf8}
.tip .pop{position:absolute;left:0;bottom:100%;margin-bottom:6px;width:230px;z-index:60;background:#0f172a;border:1px solid #334155;color:#e2e8f0;font-size:11px;line-height:1.45;font-weight:400;text-transform:none;letter-spacing:normal;padding:8px 10px;border-radius:6px;opacity:0;pointer-events:none;transition:opacity .12s;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.tip:hover .pop{opacity:1}
.tabs{display:flex;gap:4px;margin:20px 0 16px}
.tab{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:14px;font-weight:500;color:#64748b;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;border-radius:8px 8px 0 0}
.tab:hover{color:#334155}
.tab.active{color:#0f172a;background:#fff;border-bottom-color:#6366f1}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 1px 2px rgba(0,0,0,.04);overflow:hidden}
.scrollx{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;font-weight:600;background:#f8fafc;padding:10px 16px;text-align:right;white-space:nowrap}
thead th.l{text-align:left}
.sub2{font-size:9px;text-transform:none;color:#94a3b8;font-family:ui-monospace,monospace;font-weight:400}
tbody td{padding:8px 16px;text-align:right}
tbody td.l{text-align:left;color:#334155;white-space:nowrap}
tbody tr{border-top:1px solid #f1f5f9}
tbody tr:hover{background:#f8fafc}
.grp td{background:rgba(238,242,255,.7);color:#4338ca;font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;padding:6px 16px;text-align:left}
tfoot .tot td{border-top:2px solid #cbd5e1;background:#f8fafc;font-weight:600;color:#0f172a}
tfoot td{padding:8px 16px;text-align:right}
tfoot td.l{text-align:left;color:#64748b}
.pct{font-family:ui-monospace,monospace;font-size:12px}
.ok{background:#ecfdf5;color:#047857}
.warn{background:#fffbeb;color:#b45309}
.over{background:#fff1f2;color:#be123c}
.qty{width:56px;background:transparent;border:1px solid transparent;border-radius:4px;padding:2px 4px;text-align:right;font-family:ui-monospace,monospace;color:#334155;font-size:13px}
.qty:hover{border-color:#e2e8f0}
.qty:focus{outline:none;border-color:#818cf8;box-shadow:0 0 0 1px #c7d2fe}
.sticky-l{position:sticky;left:0;background:#fff}
thead .sticky-l,tfoot .sticky-l{background:#f8fafc}
.scards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
@media(min-width:768px){.scards{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1024px){.scards{grid-template-columns:repeat(7,1fr)}}
.scard{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.scard .t{font-size:11px;font-weight:600;color:#334155}
.scard .v{font-size:18px;font-weight:700;font-family:ui-monospace,monospace;color:#0f172a}
.scard .u{font-size:10px;color:#94a3b8;margin-top:-2px}
.scard .vd{font-size:10px;font-weight:500;margin-top:4px}
.foot{max-width:1280px;margin:0 auto;padding:16px;font-size:11px;color:#94a3b8}
.legend{font-size:11px;color:#94a3b8;margin-top:8px}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo, Fragment } = React;

// Crédits par action. Familles image/audio : valeur figée. Familles vidéo : crédits par seconde (cps), arrondi sup sur durée.
const CAT = [
  { f: "Remove Background", g: "quick", cr: 5 },
  { f: "Expand Image", g: "quick", cr: 31 },
  { f: "Colorize Image", g: "quick", cr: 35 },
  { f: "Vectorize Image", g: "quick", cr: 35 },
  { f: "Upscale Image — Low", g: "quick", cr: 69 },
  { f: "Upscale Image — Medium", g: "quick", cr: 138 },
  { f: "Upscale Image — High", g: "quick", cr: 207 },
  { f: "Upscale Video — Low", g: "quick", vu: 6.206896551724138 },
  { f: "Upscale Video — Medium", g: "quick", vu: 12.413793103448276 },
  { f: "Upscale Video — High", g: "quick", vu: 24.827586206896555 },
  { f: "Generate Background", g: "gen", cr: 60 },
  { f: "Text to Speech", g: "gen", cr: 87 },
  { f: "Image Generator — Ultra Low", g: "gen", cr: 31 },
  { f: "Image Generator — Low", g: "gen", cr: 61 },
  { f: "Image Generator — Medium", g: "gen", cr: 91 },
  { f: "Image Generator — High", g: "gen", cr: 190 },
  { f: "Image Generator — Ultra High", g: "gen", cr: 569 },
  { f: "Video Generator — Ultra Low", g: "gen", vg: 31.03448275862069 },
  { f: "Video Generator — Low", g: "gen", vg: 86.20689655172414 },
  { f: "Video Generator — Medium", g: "gen", vg: 96.55172413793105 },
  { f: "Video Generator — High", g: "gen", vg: 172.41379310344828 },
  { f: "Video Generator — Ultra High", g: "gen", vg: 344.82758620689657 },
];
const SCEN = [
  { k: "fullVideo", label: "Full vidéo" }, { k: "fullImage", label: "Full image" },
  { k: "fullGen", label: "Full génératif" }, { k: "fullQuick", label: "Full quick" },
  { k: "mixA", label: "Mix A · léger" }, { k: "mixB", label: "Mix B · régulier" }, { k: "mixC", label: "Mix C · intensif" },
];
const SEED = {
  "Remove Background": [0,0,0,200,60,80,100], "Expand Image": [0,0,0,40,10,20,30],
  "Colorize Image": [0,0,0,40,10,15,20], "Vectorize Image": [0,0,0,20,5,8,10],
  "Upscale Image — Low": [0,0,0,30,8,8,20], "Upscale Image — Medium": [0,0,0,10,0,3,5],
  "Upscale Image — High": [0,0,0,5,0,0,2], "Upscale Video — Low": [8,0,0,5,0,1,3],
  "Upscale Video — Medium": [3,0,0,2,0,0,1], "Upscale Video — High": [1,0,0,1,0,0,0],
  "Generate Background": [0,0,20,0,5,15,20], "Text to Speech": [0,0,5,0,0,3,5],
  "Image Generator — Ultra Low": [0,30,20,0,8,15,20], "Image Generator — Low": [0,40,30,0,8,20,30],
  "Image Generator — Medium": [0,20,15,0,0,5,10], "Image Generator — High": [0,10,8,0,0,2,5],
  "Image Generator — Ultra High": [0,3,2,0,0,0,1], "Video Generator — Ultra Low": [10,0,6,0,0,1,4],
  "Video Generator — Low": [6,0,4,0,0,0,2], "Video Generator — Medium": [4,0,2,0,0,0,1],
  "Video Generator — High": [2,0,1,0,0,0,0], "Video Generator — Ultra High": [1,0,0,0,0,0,0],
};

const fInt = (n) => (isFinite(n) ? Math.round(n).toLocaleString("fr-FR") : "—");
const fPct = (n) => (isFinite(n) ? Math.round(n * 100).toLocaleString("fr-FR") + " %" : "—");

const PLAN_KEYS = ["T", "E", "P", "S"];
const PLAN_LABEL = { T: "Trial", E: "Essential", P: "Premium", S: "Studio" };

const Svg = (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p} />;
const IcInfo = (p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Svg>;
const IcSliders = (p) => <Svg {...p}><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></Svg>;
const IcLayers = (p) => <Svg {...p}><path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></Svg>;
const IcBoxes = (p) => <Svg {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></Svg>;

function Tip({ text }) { return <span className="tip"><IcInfo className="ic" /><span className="pop">{text}</span></span>; }
function Num({ value, onChange, step = 1, suffix, sm }) {
  return <span className="inline">
    <input type="number" className={"num" + (sm ? " sm" : "")} value={value} step={step}
      onChange={(e) => onChange(e.target.value === "" ? 0 : parseFloat(e.target.value))} />
    {suffix && <span className="suf">{suffix}</span>}
  </span>;
}
function Mini({ t, children }) { return <span className="mini"><span>{t}</span>{children}</span>; }

function creditsFor(c, dur) {
  if (c.vg) return Math.ceil(c.vg * dur.gen);
  if (c.vu) return Math.ceil(c.vu * dur.upscale);
  return c.cr;
}

function App() {
  const [alloc, setAlloc] = useState({ E: 4000, P: 13000, S: 26000, T: 2000 });
  const [dur, setDur] = useState({ gen: 8, upscale: 30 });
  const [qty, setQty] = useState(() => { const o = {}; CAT.forEach((c) => (o[c.f] = SEED[c.f].slice())); return o; });
  const [tab, setTab] = useState("equiv");

  const credits = useMemo(() => { const m = {}; CAT.forEach((c) => (m[c.f] = creditsFor(c, dur))); return m; }, [dur]);
  const totals = useMemo(() => SCEN.map((s, i) => CAT.reduce((sum, c) => sum + (qty[c.f][i] || 0) * credits[c.f], 0)), [qty, credits]);
  const setQ = (f, i, v) => setQty((p) => ({ ...p, [f]: p[f].map((x, j) => (j === i ? (v === "" ? 0 : parseFloat(v)) : x)) }));

  return <div>
    <div className="console"><div className="console-inner">
      <div className="brand"><b>ModifAI</b><span className="sub">Crédits &amp; usages</span></div>
      <div className="panel">
        <div className="panel-h"><IcSliders style={{width:14,height:14}}/> Paramètres pilotables</div>
        <div className="params">
          <div>
            <div className="prow-h">Volumes crédits par plan <Tip text="Crédits alloués par plan sur un cycle. Pilotent le nombre d'actions possibles et le remplissage des scénarios." /></div>
            <div className="minis">{PLAN_KEYS.map((k) => <Mini key={k} t={PLAN_LABEL[k]}><Num value={alloc[k]} step={500} onChange={(v) => setAlloc((p) => ({ ...p, [k]: v }))} /></Mini>)}</div>
          </div>
          <div>
            <div className="prow-h">Durées réf. vidéo <Tip text="Durée de référence d'une action vidéo. Pilote le coût en crédits des familles Video Generator et Upscale Video." /></div>
            <div className="minis">
              <Mini t="Génération"><Num value={dur.gen} suffix="s" sm onChange={(v) => setDur((p) => ({ ...p, gen: v }))} /></Mini>
              <Mini t="Upscale"><Num value={dur.upscale} suffix="s" sm onChange={(v) => setDur((p) => ({ ...p, upscale: v }))} /></Mini>
            </div>
          </div>
        </div>
      </div>
    </div></div>

    <div className="wrap">
      <div className="tabs">
        <button className={"tab" + (tab === "equiv" ? " active" : "")} onClick={() => setTab("equiv")}><IcLayers style={{width:16,height:16}}/> Équivalences</button>
        <button className={"tab" + (tab === "scen" ? " active" : "")} onClick={() => setTab("scen")}><IcBoxes style={{width:16,height:16}}/> Scénarios d'usage</button>
      </div>
      {tab === "equiv" ? <Equiv credits={credits} alloc={alloc} /> : <Scenarios credits={credits} qty={qty} setQ={setQ} totals={totals} alloc={alloc} />}
    </div>
    <div className="foot">ModifAI · équivalences crédits par action et scénarios d'usage. Volumes et durées pilotables ci-dessus.</div>
  </div>;
}

function Equiv({ credits, alloc }) {
  const groups = [{ id: "quick", title: "Quick tools · retouche" }, { id: "gen", title: "Generative tools · création" }];
  return <div className="card"><table>
    <thead><tr><th className="l">Action</th><th>Crédits / action</th>
      {PLAN_KEYS.map((k) => <th key={k}>{PLAN_LABEL[k]}<div className="sub2">{fInt(alloc[k])} cr.</div></th>)}</tr></thead>
    <tbody>
      {groups.map((grp) => <Fragment key={grp.id}>
        <tr className="grp"><td colSpan={6}>{grp.title}</td></tr>
        {CAT.filter((c) => c.g === grp.id).map((c) => <tr key={c.f}>
          <td className="l">{c.f}</td><td className="mono">{fInt(credits[c.f])}</td>
          {PLAN_KEYS.map((k) => <td key={k} className="mono" style={{color:"#475569"}}>{fInt(Math.floor(alloc[k] / credits[c.f]))}</td>)}
        </tr>)}
      </Fragment>)}
    </tbody>
  </table></div>;
}

function pctClass(p) { return p <= 1 ? "ok" : p <= 1.5 ? "warn" : "over"; }
function verdict(total, alloc) {
  if (total <= alloc.E) return { t: "Tient dans Essential", c: "#059669" };
  if (total <= alloc.P) return { t: "Tient dans Premium", c: "#059669" };
  if (total <= alloc.S) return { t: "Tient dans Studio", c: "#b45309" };
  return { t: "Déborde Studio", c: "#e11d48" };
}
function Scenarios({ credits, qty, setQ, totals, alloc }) {
  return <div>
    <div className="scards">{SCEN.map((s, i) => { const v = verdict(totals[i], alloc);
      return <div className="scard" key={s.k}><div className="t">{s.label}</div><div className="v">{fInt(totals[i])}</div>
        <div className="u">crédits / mois</div><div className="vd" style={{ color: v.c }}>{v.t}</div></div>; })}
    </div>
    <div className="card scrollx"><table>
      <thead><tr><th className="l sticky-l">Action</th><th>Cr./action</th>
        {SCEN.map((s) => <th key={s.k}>{s.label}</th>)}</tr></thead>
      <tbody>{CAT.map((c) => <tr key={c.f}>
        <td className="l sticky-l">{c.f}</td><td className="mono" style={{color:"#94a3b8"}}>{fInt(credits[c.f])}</td>
        {SCEN.map((s, i) => <td key={s.k}><input className="qty" type="number" value={qty[c.f][i]} onChange={(e) => setQ(c.f, i, e.target.value)} /></td>)}
      </tr>)}</tbody>
      <tfoot>
        <tr className="tot"><td className="l sticky-l">Total crédits / mois</td><td></td>
          {totals.map((t, i) => <td key={i} className="mono">{fInt(t)}</td>)}</tr>
        {[["E", "Essential"], ["P", "Premium"], ["S", "Studio"]].map(([k, lab]) => <tr key={k}>
          <td className="l sticky-l" style={{fontSize:12}}>% de {lab} <span className="mono" style={{color:"#94a3b8"}}>({fInt(alloc[k])})</span></td><td></td>
          {totals.map((t, i) => { const p = t / alloc[k]; return <td key={i} className={"pct " + pctClass(p)}>{fPct(p)}</td>; })}
        </tr>)}
      </tfoot>
    </table></div>
    <p className="legend">Vert : le panier tient dans le plan (≤ 100 %). Ambre : dépasse jusqu'à 150 %. Rouge : au-delà. Quantités éditables directement dans le tableau.</p>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
