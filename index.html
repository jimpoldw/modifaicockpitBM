<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useEffect, Fragment } = React;

const SHEET = "https://docs.google.com/spreadsheets/d/13I_UlYHS-7lkY8EYRTVDDSLYXuLXG1MdqzkM-RrX1QQ/edit";

// Crédits par action. Image/audio : valeur figée. Vidéo : crédits par seconde, arrondi sup sur durée.
const CAT = [
  { f:"Remove Background", sec:"retouche", label:"Remove Background", cr:5 },
  { f:"Expand Image", sec:"retouche", label:"Expand Image", cr:31 },

  { f:"Image Generator — Ultra High", sec:"imgGen", label:"Image Generator — Ultra High Quality", cr:569 },
  { f:"Video Generator — Ultra Low", sec:"vidGen", label:"Video Generator — Ultra Low Quality", vg:31.03448275862069 },
  { f:"Video Generator — Low", sec:"vidGen", label:"Video Generator — Low Quality", vg:86.20689655172414 },
  { f:"Video Generator — Medium", sec:"vidGen", label:"Video Generator — Medium Quality", vg:96.55172413793105 },
  { f:"Video Generator — High", sec:"vidGen", label:"Video Generator — High Quality", vg:172.41379310344828 },
  { f:"Video Generator — Ultra High", sec:"vidGen", label:"Video Generator — Ultra High Quality", vg:344.82758620689657 },
];
const SECTIONS = [
  { id:"retouche", title:"Quick Tool · Retouche" },
  { id:"upImg", title:"Quick Tool · Upscale Image" },
  { id:"upVid", title:"Quick Tool · Upscale Video", dur:"upscale" },
  { id:"genBg", title:"Generative Tool · Generate Background" },
  { id:"tts", title:"Generative Tool · Text To Speech" },
  { id:"imgGen", title:"Generative Tool · Image Generator" },
  { id:"vidGen", title:"Generative Tool · Video Generator", dur:"gen" },
];
const SCEN = [
  { k:"fullVideo", label:"Full vidéo", desc:"100% vidéo : génération et upscale" },
  { k:"fullImage", label:"Full image", desc:"100% génération d'images" },
  { k:"fullGen", label:"Full génératif", desc:"Tout le génératif : image, vidéo, fond, audio" },
  { k:"fullQuick", label:"Full quick", desc:"100% quick tools de retouche" },
  { k:"mixA", label:"Mix A · léger", desc:"Usage occasionnel, faibles volumes" },
  { k:"mixB", label:"Mix B · régulier", desc:"Usage régulier, volumes moyens" },
  { k:"mixC", label:"Mix C · intensif", desc:"Usage intensif, gros volumes" },
];
const SEED = {
  "Remove Background": [0,0,0,200,60,80,100], "Expand Image": [0,0,0,40,10,20,30],
  "Colorize Image": [0,0,0,40,10,15,20], "Vectorize Image": [0,0,0,20,5,8,10],
  "Upscale Image — Low": [0,0,0,30,8,8,20], "Upscale Image — Medium": [0,0,0,10,0,3,5],
  "Upscale Image — High": [0,0,0,5,0,0,2], "Upscale Video — Low": [8,0,0,5,0,1,3],
  "Upscale Video — Medium": [3,0,0,2,0,0,1], "Upscale Video — High": [1,0,0,1,0,0,0],
  "Generate Background": [0,0,20,0,5,15,20], "Text to Speech": [0,0,5,0,0,3,5],
  "Image Generator — Ultra Low": [0,30,20,0,8,15,20], "Image Generator — Low": [0,40,30,0,8,20,30],
  "Image Generator — Medium": [0,20,15,0,0,5,10], "Image Generator — High": [0,10,8,0,0,2,5],
  "Image Generator — Ultra High": [0,3,2,0,0,0,1], "Video Generator — Ultra Low": [10,0,6,0,0,1,4],
  "Video Generator — Low": [6,0,4,0,0,0,2], "Video Generator — Medium": [4,0,2,0,0,0,1],
  "Video Generator — High": [2,0,1,0,0,0,0], "Video Generator — Ultra High": [1,0,0,0,0,0,0],
};

const K = { M0: 0.7903333333333334, M2: 1.08, M12: 2 };
const COEFF = {
  M0:  { T: 1.3894736842105265e-8, E: 3.6300000000000006e-11, P: 3.267e-10,            S: 1.037142857142857e-11 },
  M2:  { T: 1.3894736842105265e-8, E: 5.346000000000001e-11,  P: 4.811400000000001e-10, S: 1.527428571428571e-11 },
  M12: { T: 1.3894736842105265e-8, E: 7.310970814416789e-11,  P: 6.579873732975109e-10, S: 2.088848804119082e-11 },
};
const THRESH = { M0: { g: 0.5, y: 0.4 }, M2: { g: 0.95, y: 0.85 }, M12: { g: 1.9, y: 1.75 } };
function rclass(h, v) { const t = THRESH[h]; return v >= t.g ? "rgood" : v >= t.y ? "rwarn" : "rbad"; }

const fInt = (n) => (isFinite(n) ? Math.round(n).toLocaleString("fr-FR") : "—");
const fPct = (n) => (isFinite(n) ? Math.round(n * 100).toLocaleString("fr-FR") + " %" : "—");
const fMul = (n) => (isFinite(n) ? n.toFixed(2).replace(".", ",") + "×" : "—");

const PLAN_KEYS = ["T", "E", "P", "S"];
const PLAN_LABEL = { T: "Trial", E: "Essential", P: "Premium", S: "Studio" };

const Svg = (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p} />;
const IcInfo = (p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Svg>;
const IcSliders = (p) => <Svg {...p}><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></Svg>;
const IcLayers = (p) => <Svg {...p}><path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></Svg>;
const IcBoxes = (p) => <Svg {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></Svg>;
const IcChevron = (p) => <Svg {...p}><path d="m9 18 6-6-6-6"/></Svg>;
const IcReset = (p) => <Svg {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Svg>;

function Tip({ text }) { return <span className="tip"><IcInfo className="ic" /><span className="pop">{text}</span></span>; }
function Num({ value, onChange, step = 1, suffix }) {
  return <span className="inline">
    <input type="number" className="num" value={value} step={step}
      onChange={(e) => onChange(e.target.value === "" ? 0 : parseFloat(e.target.value))} />
    {suffix && <span className="suf">{suffix}</span>}
  </span>;
}
function Mini({ t, children }) { return <span className="mini"><span>{t}</span>{children}</span>; }

function creditsFor(c, dur) {
  if (c.vg) return Math.ceil(c.vg * dur.gen);
  if (c.vu) return Math.ceil(c.vu * dur.upscale);
  return c.cr;
}
function multiple(t, a) {
  const c = COEFF[t];
  return K[t] - (c.T * a.T * a.T + c.E * a.E * a.E + c.P * a.P * a.P + c.S * a.S * a.S);
}

function SecHeader({ sec, open, onToggle, dur, setDur, colSpan }) {
  return <tr className="grp" onClick={onToggle}>
    <td colSpan={colSpan} className="sticky-l">
      <span className="grp-h"><IcChevron className={"chev" + (open ? " open" : "")} />{sec.title}</span>
      {sec.dur && <span className="grp-dur" onClick={(e) => e.stopPropagation()}>
        durée réf
        <input type="number" className="durin" value={dur[sec.dur]}
          onChange={(e) => setDur((p) => ({ ...p, [sec.dur]: e.target.value === "" ? 0 : parseFloat(e.target.value) }))} /> s
      </span>}
    </td>
  </tr>;
}

function App() {
  const [alloc, setAlloc] = useState({ E: 4000, P: 13000, S: 26000, T: 2000 });
  const [dur, setDur] = useState({ gen: 8, upscale: 30 });
  const [qty, setQty] = useState(() => { const o = {}; CAT.forEach((c) => (o[c.f] = SEED[c.f].slice())); return o; });
  const [tab, setTab] = useState("equiv");
  const [open, setOpen] = useState({ retouche:true, upImg:true, upVid:true, genBg:true, tts:true, imgGen:true, vidGen:true });
  const toggle = (id) => setOpen((p) => ({ ...p, [id]: !p[id] }));

  const credits = useMemo(() => { const m = {}; CAT.forEach((c) => (m[c.f] = creditsFor(c, dur))); return m; }, [dur]);
  const totals = useMemo(() => SCEN.map((s, i) => CAT.reduce((sum, c) => sum + (qty[c.f][i] || 0) * credits[c.f], 0)), [qty, credits]);
  const mult = useMemo(() => ({ M0: multiple("M0", alloc), M2: multiple("M2", alloc), M12: multiple("M12", alloc) }), [alloc]);
  const setQ = (f, i, v) => setQty((p) => ({ ...p, [f]: p[f].map((x, j) => (j === i ? (v === "" ? 0 : parseFloat(v)) : x)) }));
  const resetQty = () => setQty(() => { const o = {}; CAT.forEach((c) => (o[c.f] = SEED[c.f].slice())); return o; });
  const consoleRef = useRef(null);
  const [consoleH, setConsoleH] = useState(120);
  useEffect(() => {
    const el = consoleRef.current; if (!el) return;
    const update = () => setConsoleH(el.offsetHeight);
    update();
    const ro = new ResizeObserver(update); ro.observe(el);
    window.addEventListener("resize", update);
    return () => { ro.disconnect(); window.removeEventListener("resize", update); };
  }, []);

  return <div>
    <div className="console" ref={consoleRef}><div className="console-inner">
      <div className="brand"><b>ModifAI</b><span className="sub">Arbitrage crédits</span></div>
      <div className="cols">
        <div className="panel">
          <div className="panel-h"><IcSliders style={{width:14,height:14}}/> Volumes crédits par plan <Tip text="Crédits alloués par plan sur un cycle. Pilotent le nombre d'actions possibles, le remplissage des scénarios et la rentabilité." /></div>
          <div className="params">
            <div>
              <div className="minis">{PLAN_KEYS.map((k) => <Mini key={k} t={PLAN_LABEL[k]}><Num value={alloc[k]} step={500} onChange={(v) => setAlloc((p) => ({ ...p, [k]: v }))} /></Mini>)}</div>
            </div>
          </div>
        </div>
        <div className="panel">
          <div className="renta-head">
            <span className="renta-title">Rentabilité <Tip text="Multiple net par euro investi en acquisition, par horizon. Vert : objectif atteint. Jaune : proche de l'objectif. Rouge : sous l'objectif. Réagit aux volumes crédits. Ne prend pas en compte les achats Extra Crédits qui augmenteront la rentabilité." /></span>
            <a className="renta-link" href={SHEET} target="_blank" rel="noopener">Baseline &amp; détail ↗</a>
          </div>
          <div className="renta-tiles">
            {["M0", "M2", "M12"].map((h) => {
              const v = mult[h];
              return <div className={"rcard " + rclass(h, v)} key={h}>
                <div className="rlabel">Multiple net {h}</div>
                <div className="rvalue">{fMul(v)}</div>
              </div>;
            })}
          </div>
        </div>
      </div>
    </div></div>

    <div className="wrap">
      <div className="tabs">
        <button className={"tab" + (tab === "equiv" ? " active" : "")} onClick={() => setTab("equiv")}><IcLayers style={{width:16,height:16}}/> Équivalences</button>
        <button className={"tab" + (tab === "scen" ? " active" : "")} onClick={() => setTab("scen")}><IcBoxes style={{width:16,height:16}}/> Scénarios d'usage</button>
      </div>
      {tab === "equiv"
        ? <Equiv credits={credits} alloc={alloc} dur={dur} setDur={setDur} open={open} toggle={toggle} />
        : <Scenarios credits={credits} qty={qty} setQ={setQ} totals={totals} alloc={alloc} dur={dur} setDur={setDur} open={open} toggle={toggle} consoleH={consoleH} resetQty={resetQty} />}
    </div>
    <div className="pagefoot"></div>
  </div>;
}

function Equiv({ credits, alloc, dur, setDur, open, toggle }) {
  return <div className="card scrollx"><table>
    <thead><tr><th className="l">Action</th><th>Crédits / action</th>
      {PLAN_KEYS.map((k) => <th key={k}>{PLAN_LABEL[k]}<div className="sub2">{fInt(alloc[k])} cr.</div></th>)}</tr></thead>
    <tbody>
      {SECTIONS.map((sec) => <Fragment key={sec.id}>
        <SecHeader sec={sec} open={open[sec.id]} onToggle={() => toggle(sec.id)} dur={dur} setDur={setDur} colSpan={6} />
        {open[sec.id] && CAT.filter((c) => c.sec === sec.id).map((c) => <tr key={c.f}>
          <td className="l">{c.label}</td><td className="mono">{fInt(credits[c.f])}</td>
          {PLAN_KEYS.map((k) => <td key={k} className="mono" style={{color:"#475569"}}>{fInt(Math.floor(alloc[k] / credits[c.f]))}</td>)}
        </tr>)}
      </Fragment>)}
    </tbody>
  </table></div>;
}

function pctClass(p) { return p <= 1 ? "ok" : p <= 1.5 ? "warn" : "over"; }
function verdict(total, alloc) {
  if (total <= alloc.E) return { t: "Plan minimum : Essential", c: "#2563eb" };
  if (total <= alloc.P) return { t: "Plan minimum : Premium", c: "#2563eb" };
  if (total <= alloc.S) return { t: "Plan minimum : Studio", c: "#2563eb" };
  return { t: "Dépasse Studio", c: "#e11d48" };
}
function Scenarios({ credits, qty, setQ, totals, alloc, dur, setDur, open, toggle, consoleH, resetQty }) {
  const ncol = 2 + SCEN.length;
  return <div>
    <p className="scards-intro">Chaque panier correspond à un profil d'usage type, les consommations étant modifiables. Permet de matcher les profils avec les plans.</p>
    <div className="scards">{SCEN.map((s, i) => { const v = verdict(totals[i], alloc);
      return <div className="scard" key={s.k}>
        <div className="t">{s.label}</div>
        <div className="sdesc">{s.desc}</div>
        <div className="v">{fInt(totals[i])} <span className="vu2">cr/mois</span></div>
        <div className="vd" style={{ color: v.c }}>{v.t}</div>
      </div>; })}
    </div>
    <div className="stickyhead"><table style={{ ["--ch"]: consoleH + "px" }}>
      <thead><tr><th className="l sticky-l">Action <button className="resetbtn" onClick={resetQty} title="Remettre toutes les quantités au scénario de base"><IcReset style={{width:12,height:12}}/> Réinitialiser</button></th><th>Cr./action</th>
        {SCEN.map((s) => <th key={s.k}>{s.label}</th>)}</tr></thead>
      <tbody>
        {SECTIONS.map((sec) => <Fragment key={sec.id}>
          <SecHeader sec={sec} open={open[sec.id]} onToggle={() => toggle(sec.id)} dur={dur} setDur={setDur} colSpan={ncol} />
          {open[sec.id] && CAT.filter((c) => c.sec === sec.id).map((c) => <tr key={c.f}>
            <td className="l sticky-l">{c.label}</td><td className="mono" style={{color:"#94a3b8"}}>{fInt(credits[c.f])}</td>
            {SCEN.map((s, i) => <td key={s.k}><input className={"qty " + (qty[c.f][i] > 0 ? "pos" : "zero")} type="number" value={qty[c.f][i]} onChange={(e) => setQ(c.f, i, e.target.value)} /></td>)}
          </tr>)}
        </Fragment>)}
      </tbody>
      <tfoot>
        <tr className="tot"><td className="l sticky-l">Total crédits / mois consommés</td><td></td>
          {totals.map((t, i) => <td key={i} className="mono">{fInt(t)}</td>)}</tr>
        <tr><td className="footlabel" colSpan={ncol}>Remplissage du quota mensuel par plan</td></tr>
        {[["E","Essential"],["P","Premium"],["S","Studio"]].map(([k,lab]) => <tr key={k}>
          <td className="l sticky-l" style={{fontSize:12}}>{lab} <span className="mono" style={{color:"#94a3b8"}}>({fInt(alloc[k])} cr)</span></td><td className="gcol"></td>
          {totals.map((t,i) => { const p = t / alloc[k]; return <td key={i} className={"pct " + pctClass(p)}>{fPct(p)}</td>; })}
        </tr>)}
      </tfoot>
    </table></div>
    <p className="legend">Remplissage = part du quota mensuel du plan consommée par le panier. Vert : tient dans le plan (≤ 100 %). Ambre : dépasse jusqu'à 150 %. Rouge : au-delà.</p>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
