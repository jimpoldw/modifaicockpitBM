const TVA = 0.2;
const htOf = (ttc) => ttc / (1 + TVA);
const REV = { T: 0.036, P: 0.022 };
const RBASE = { M2: 1.08, M12: 2 };
const CW = {
  T: { M0: 2.2e-8, M2: 2.2e-8, M12: 2.2e-8 },
  E: { M0: 6.05e-10, M2: 8.91e-10, M12: 1.2184951357361314e-9 },
  P: { M0: 1.089e-8, M2: 1.6038e-8, M12: 2.1932912443250363e-8 },
  S: { M0: 6.05e-10, M2: 8.91e-10, M12: 1.2184951357361314e-9 },
};
const THRESH = { M0: { g: 0.65, y: 0.5 }, M2: { g: 0.9, y: 0.75 }, M12: { g: 1.8, y: 1.6 } };
function rclass(h, v) { const t = THRESH[h]; return v >= t.g ? "rgood" : v >= t.y ? "rwarn" : "rbad"; }

const fInt = (n) => (isFinite(n) ? Math.round(n).toLocaleString("fr-FR") : "—");
const fPct = (n) => (isFinite(n) ? Math.round(n * 100).toLocaleString("fr-FR") + " %" : "—");
const fMul = (n) => (isFinite(n) ? n.toFixed(2).replace(".", ",") + "×" : "—");
const ttcOf = (ht) => ht * (1 + TVA);
const dispOur = (ttc, mode) => (mode === "TTC" ? ttc : htOf(ttc));
const dispComp = (ht, mode) => (mode === "TTC" ? ttcOf(ht) : ht);
const fMoney = (v) => { if (!isFinite(v)) return "—"; const r = Math.round(v * 100) / 100; return Math.abs(r - Math.round(r)) < 0.005 ? Math.round(r).toLocaleString("fr-FR") : r.toFixed(2).replace(".", ","); };

// Zone de calibration : ancrée sur la grille Reco JP. Au delà de ce facteur, M2/M12 saturent (ARPA cible figé).
const REALISM_FACTOR = 3;
function outOfRealisticZone(price) {
  return ["E", "P", "S"].some((k) => price[k] > RECO.price[k] * REALISM_FACTOR || price[k] < RECO.price[k] / REALISM_FACTOR);
}

function Tip({ text }) { return <span className="tip"><IcInfo className="ic" /><span className="pop">{text}</span></span>; }
function Num({ value, onChange, step = 1, suffix }) {
  return <span className="inline">
    <input type="number" className="num" value={value} step={step}
      onChange={(e) => onChange(e.target.value === "" ? 0 : parseFloat(e.target.value))} />
    {suffix && <span className="suf">{suffix}</span>}
  </span>;
}
function Mini({ t, children }) { return <span className="mini"><span>{t}</span>{children}</span>; }

function creditsFor(c, dur) {
  if (c.vg) return Math.ceil(c.vg * dur.gen);
  if (c.vu) return Math.ceil(c.vu * dur.upscale);
  return c.cr;
}
function multiple(t, price, alloc) {
  const h = { T: htOf(price.T), E: htOf(price.E), P: htOf(price.P), S: htOf(price.S) };
  const cost = CW.T[t]*alloc.T*alloc.T/h.T + CW.E[t]*alloc.E*alloc.E/h.E + CW.P[t]*alloc.P*alloc.P/h.P + CW.S[t]*alloc.S*alloc.S/h.S;
  const rev = t === "M0" ? (REV.T*h.T + REV.P*h.P) : RBASE[t];
  return rev - cost;
}

function SecHeader({ sec, open, onToggle, dur, setDur, colSpan }) {
  return <tr className="grp" onClick={onToggle}>
    <td colSpan={colSpan} className="sticky-l">
      <span className="grp-h"><IcChevron className={"chev" + (open ? " open" : "")} />{sec.title}</span>
      {sec.dur && <span className="grp-dur" onClick={(e) => e.stopPropagation()}>
        durée réf
        <input type="number" className="durin" value={dur[sec.dur]}
          onChange={(e) => setDur((p) => ({ ...p, [sec.dur]: e.target.value === "" ? 0 : parseFloat(e.target.value) }))} /> s
      </span>}
    </td>
  </tr>;
}

        { model: "Nano Banana 2 4K", our: null, v: { e: 53, p: 133, pp: 300, pro: 2000 } },
        { model: "Nano Banana Pro (1K/2K)", our: null, v: { e: 106, p: 266, pp: 600, pro: 2000 } },
        { model: "GPT Image 2.0 Mid 2K", our: "gptimg", v: { e: 20, p: 50, pp: 112, pro: 750 } },
        { model: "Seedream 5.0 Lite 4K", our: "seedream", v: { e: 180, p: 400, pp: "∞", pro: "∞" } },
        { model: "Krea 2", our: null, v: { e: 100, p: 250, pp: 562, pro: 3750 } },
        { model: "Luma Uni-1.1", our: null, v: { e: 57, p: 142, pp: 321, pro: 2142 } },
        { model: "Recraft V4.1 Pro", our: null, v: { e: 45, p: 114, pp: "∞", pro: "∞" } },
        { model: "Grok", our: null, v: { e: 114, p: 285, pp: "∞", pro: "∞" } },
        { model: "Flux.2 Max 1K", our: null, v: { e: 61, p: 153, pp: 346, pro: "∞" } },
        { model: "Flux.2 Pro 1K", our: null, v: { e: 180, p: 400, pp: "∞", pro: "∞" } },
      ] },
    ],
  },
  artlist: {
    label: "Artlist",
    icon: "artlist", bg: "#fef0c3", url: "https://artlist.io/page/pricing/max?tab=ai-suite",
    note: "Artlist ne détaille pas par modèle : comparatif global « jusqu'à » (relevé du 18/06/2026, mensuel). Volumes calés sur les paliers Starter publiés (10 cr/image, 80 cr/vidéo), prorata pour Creator et Professional. Le plan Voiceover (voix only) figure dans la liste mais hors comparatif image/vidéo. Nos colonnes se calculent en live sur notre modèle le moins cher.",
    global: true,
    plans: [
      { id: "voice", name: "AI Voiceover", price: 15.99, hideUsage: true },
      { id: "s16", name: "AI Starter", price: 19.99, img: 1650, vid: 206 },
      { id: "s40", name: "AI Starter", price: 39.99, img: 4000, vid: 500 },
      { id: "c80", name: "AI Creator", price: 69.99, img: 8000, vid: 1000 },
      { id: "c180", name: "AI Creator", price: 149.99, img: 18000, vid: 2250 },
      { id: "c240", name: "AI Creator", price: 199.99, img: 24000, vid: 3000 },
      { id: "p500", name: "AI Professional", price: 399.99, img: 50000, vid: 6250 },
      { id: "p1m", name: "AI Professional", price: 799.99, img: 100000, vid: 12500 },
      { id: "p15", name: "AI Professional", price: 1199.99, img: 150000, vid: 18750 },
    ],
    rows: [
      { model: "Images (jusqu'à)", kind: "img" },
      { model: "Vidéos (jusqu'à)", kind: "vid" },
    ],
  },
};

function volCell(v, isUs) {
  if (v === null || v === undefined) return <span className="xcell">✕</span>;
  if (typeof v === "string") return <span className={"compvol" + (isUs ? "" : " them")}>{v}</span>;
  return <span className={"compvol" + (isUs ? "" : " them")}>{fInt(v)}</span>;
}

function CompView({ comp, price, alloc, vatMode }) {
  const PLAN3 = ["E", "P", "S"];
  const LBL = { E: "Essential", P: "Premium", S: "Studio" };
  const ours = (modelKey, planKey) => { const c = OURMODEL[modelKey]; return c ? Math.floor(alloc[planKey] / c) : null; };
  const oursGlobal = (kind, planKey) => Math.floor(alloc[planKey] / (kind === "img" ? OUR_CHEAP_IMG : OUR_CHEAP_VID));

  // Sélection dynamique : pour chaque plan ModifAI, le plan concurrent le plus proche en prix (base HT commune)
  const pool = comp.plans.filter((p) => !p.hideUsage);
  const pick = (htv) => pool.reduce((best, p) => (Math.abs(p.price - htv) < Math.abs(best.price - htv) ? p : best), pool[0]);
  const picked = { E: pick(htOf(price.E)), P: pick(htOf(price.P)), S: pick(htOf(price.S)) };
  const pickedSet = new Set(PLAN3.map((k) => picked[k]));

  const planVol = (plan, row) => { const id = plan.base || plan.id; let v = row.v[id]; if (plan.mult && typeof v === "number") v = v * plan.mult; return v; };
  const themVol = (plan, row) => (comp.global ? (row.kind === "img" ? plan.img : plan.vid) : planVol(plan, row));

  const renderRow = (row) => <tr key={row.model}>
    <td className="l">{row.model}</td>
    {PLAN3.map((k) => <td key={k} className="us">{volCell(comp.global ? oursGlobal(row.kind, k) : ours(row.our, k), true)}</td>)}
    {PLAN3.map((k, i) => <td key={k} className={"them" + (i === 0 ? " sep" : "")}>{volCell(themVol(picked[k], row), false)}</td>)}
  </tr>;

  let body;
  if (comp.global) {
    body = comp.rows.map(renderRow);
  } else {
    const sharedSecs = comp.sections.map((s) => ({ title: s.title, rows: s.rows.filter((r) => r.our != null) })).filter((s) => s.rows.length);
    const extraSecs = comp.sections.map((s) => ({ title: s.title, rows: s.rows.filter((r) => r.our == null) })).filter((s) => s.rows.length);
    body = <Fragment>
      {sharedSecs.map((sec) => <Fragment key={"s" + sec.title}>
        <tr className="compsec"><td colSpan={7}>{sec.title}</td></tr>
        {sec.rows.map(renderRow)}
      </Fragment>)}
      {extraSecs.length > 0 && <tr className="compgroup"><td colSpan={7}>Aussi proposés par {comp.label}, pas encore chez ModifAI<span className="cghint">Veille concurrence et pistes d'intégration pour l'équipe API</span></td></tr>}
      {extraSecs.map((sec) => <Fragment key={"e" + sec.title}>
        <tr className="compsec sub"><td colSpan={7}>{sec.title}</td></tr>
        {sec.rows.map(renderRow)}
      </Fragment>)}
    </Fragment>;
  }

  const allSorted = [...comp.plans].sort((a, b) => a.price - b.price);

  return <div>
    <p className="compnote">{comp.note}</p>
    <div className="stickyhead"><table>
      <thead>
        <tr className="brandrow">
          <th className="l corner"></th>
          <th className="us" colSpan={3}>
            <span className="brandcell"><img className="brandico" src={ICON.modifai} alt="" />ModifAI</span>
          </th>
          <th className="them sep" colSpan={3} style={{ background: comp.bg }}>
            <span className="brandcell"><img className="brandico" src={ICON[comp.icon]} alt="" />{comp.label}
              <a className="pricelink" href={comp.url} target="_blank" rel="noopener noreferrer" title="Voir la page de pricing">↗</a>
            </span>
          </th>
        </tr>
        <tr className="planrow">
          <th className="l modelhead">Modèle</th>
          {PLAN3.map((k) => <th key={k} className="us">
            <span className="planname">{LBL[k]}</span><span className="bigprice">{fMoney(dispOur(price[k], vatMode))}€</span>
          </th>)}
          {PLAN3.map((k, i) => <th key={k} className={"them" + (i === 0 ? " sep" : "")}>
            <span className="planname">{picked[k].name}</span><span className="bigprice">{fMoney(dispComp(picked[k].price, vatMode))}€</span>
          </th>)}
        </tr>
      </thead>
      <tbody>{body}</tbody>
    </table></div>

    <div className="planref">
      <div className="prtitle">Tous les plans {comp.label} (mensuel, {vatMode})<span className="prhint">surlignés = comparés à vos plans actuels</span></div>
      <div className="prgrid">
        {allSorted.map((p) => <div key={p.id} className={"prchip" + (pickedSet.has(p) ? " on" : "")}>
          <span className="prname">{p.name}</span><span className="prprice">{fMoney(dispComp(p.price, vatMode))}€</span>
        </div>)}
      </div>
      <p className="prnote">{vatMode === "TTC"
        ? "Tarifs concurrents convertis en TTC (TVA 20% estimée, marché EU). Catalogues affichés en HT sur leurs sites."
        : "Tarifs concurrents en HT (catalogue). Vos prix convertis en HT depuis le TTC saisi."}</p>
    </div>

    <p className="legend">Tous les volumes sont des maxima « jusqu'à » (réglages les plus bas). ✕ = modèle non proposé. ∞ = illimité annoncé. Les colonnes concurrent affichent le plan le plus proche de votre prix ; les volumes ModifAI se recalculent en live selon les jetons.</p>
  </div>;
}

function App() {
  const [alloc, setAlloc] = useState({ ...RECO.alloc });
  const [price, setPrice] = useState({ ...RECO.price });
  const [vatMode, setVatMode] = useState("TTC");
  const [dur, setDur] = useState({ gen: 8, upscale: 30 });
  const [qty, setQty] = useState(() => { const o = {}; CAT.forEach((c) => (o[c.f] = SEED[c.f].slice())); return o; });
  const [tab, setTab] = useState("equiv");
  const [open, setOpen] = useState({ retouche:true, upImg:true, upVid:true, genBg:true, tts:true, imgGen:true, vidGen:true });
  const toggle = (id) => setOpen((p) => ({ ...p, [id]: !p[id] }));

  const credits = useMemo(() => { const m = {}; CAT.forEach((c) => (m[c.f] = creditsFor(c, dur))); return m; }, [dur]);
  const totals = useMemo(() => SCEN.map((s, i) => CAT.reduce((sum, c) => sum + (qty[c.f][i] || 0) * credits[c.f], 0)), [qty, credits]);
  const mult = useMemo(() => ({ M0: multiple("M0", price, alloc), M2: multiple("M2", price, alloc), M12: multiple("M12", price, alloc) }), [price, alloc]);
  const outOfZone = outOfRealisticZone(price);
  const setQ = (f, i, v) => setQty((p) => ({ ...p, [f]: p[f].map((x, j) => (j === i ? (v === "" ? 0 : parseFloat(v)) : x)) }));
  const resetQty = () => setQty(() => { const o = {}; CAT.forEach((c) => (o[c.f] = SEED[c.f].slice())); return o; });
  const isReco = PLAN_KEYS.every((k) => price[k] === RECO.price[k] && alloc[k] === RECO.alloc[k]);
  const applyReco = () => { setPrice({ ...RECO.price }); setAlloc({ ...RECO.alloc }); };
  return <div className="page">
    <div className="console"><div className="console-inner">
      <div className="brand"><b>ModifAI</b><span className="sub">Arbitrage crédits</span></div>
      <div className="cols">
        <div className="panel volpanel">
          <div className="panel-h">
            <span className="ph-title"><IcSliders style={{width:14,height:14}}/> Prix &amp; jetons par plan <Tip text={"Prix affiché aux utilisateurs et jetons inclus, par plan. Bascule HT/TTC applicable partout. La rentabilité se calcule toujours sur le HT (TTC / 1,2)."} /></span>
            <div className="ph-right">
              <div className="vatseg">
                <button className={"vatopt" + (vatMode === "TTC" ? " on" : "")} onClick={() => setVatMode("TTC")}>TTC</button>
                <button className={"vatopt" + (vatMode === "HT" ? " on" : "")} onClick={() => setVatMode("HT")}>HT</button>
              </div>
              <button className={"recobtn" + (isReco ? " on" : "")} onClick={applyReco}>{isReco ? "✓ Reco JP" : "Reco JP"}</button>
            </div>
          </div>
          <div className="params">
            <div>
              <div className="minis">{PLAN_KEYS.map((k) => <div className="pcol" key={k}>
                <div className="pcol-h">{PLAN_LABEL[k]}</div>
                <label className="fld"><span>Prix {vatMode} (€)</span><Num value={vatMode === "TTC" ? price[k] : Math.round(htOf(price[k]) * 100) / 100} step={k === "T" ? 0.1 : (vatMode === "HT" ? 0.01 : 1)} onChange={(v) => setPrice((p) => ({ ...p, [k]: vatMode === "TTC" ? v : ttcOf(v) }))} /></label>
                <label className="fld"><span>Jetons</span><Num value={alloc[k]} step={500} onChange={(v) => setAlloc((p) => ({ ...p, [k]: v }))} /></label>
              </div>)}</div>
            </div>
          </div>
        </div>
        <div className="panel rentapanel">
          <div className="renta-head">
            <span className="renta-title">Rentabilité <Tip text={"Multiple net par euro investi en acquisition. Basé sur la modélisation économique des nouvelles offres (pricing plans, CPA, répartition des plans...).\nRéagit aux prix et aux volumes de crédits.\nSous-évalué car ne prend pas en compte les achats d'Extra Crédits, difficiles à anticiper."} /></span>
            <a className="renta-link" href={SHEET} target="_blank" rel="noopener">Baseline &amp; détail ↗</a>
          </div>
          <div className="renta-tiles">
            {["M0", "M2", "M12"].map((h) => {
              const v = mult[h];
              return <div className={"rcard " + rclass(h, v)} key={h}>
                <div className="rlabel">Multiple net {h}</div>
                <div className="rvalue">{fMul(v)}</div>
              </div>;
            })}
          </div>
          {outOfZone && <div className="zone-alert"><b>⚠️ Hors zone de calibration.</b> Les multiples M2 et M12 reposent sur un ARPA cible figé, établi par l'équipe data sur données réelles. Le prix saisi n'agit que sur le coût, jamais sur ce revenu de référence : au delà d'une fourchette réaliste, M2 et M12 saturent vers leur plafond et ne sont plus interprétables. Seul M0 suit le prix, mais il ne capte que le cash encaissé à l'acquisition.</div>}
          <p className="renta-note">Hors Extra Credits : leurs achats ne sont pas comptés ici et remonteront la rentabilité réelle.</p>
        </div>
      </div>
    </div></div>

    <div className="wrap">
      <div className="tabs">
        <button className={"tab" + (tab === "equiv" ? " active" : "")} onClick={() => setTab("equiv")}><IcLayers style={{width:16,height:16}}/> Équivalences</button>
        <button className={"tab" + (tab === "scen" ? " active" : "")} onClick={() => setTab("scen")}><IcBoxes style={{width:16,height:16}}/> Scénarios d'usage</button>
        <button className={"tab" + (tab === "higgsfield" ? " active" : "")} onClick={() => setTab("higgsfield")}>vs Higgsfield</button>
        <button className={"tab" + (tab === "magnific" ? " active" : "")} onClick={() => setTab("magnific")}>vs Magnific</button>
        <button className={"tab" + (tab === "artlist" ? " active" : "")} onClick={() => setTab("artlist")}>vs Artlist</button>
      </div>
      {tab === "equiv" && <Equiv credits={credits} alloc={alloc} dur={dur} setDur={setDur} open={open} toggle={toggle} />}
      {tab === "scen" && <Scenarios credits={credits} qty={qty} setQ={setQ} totals={totals} alloc={alloc} dur={dur} setDur={setDur} open={open} toggle={toggle} resetQty={resetQty} />}
      {COMP[tab] && <CompView comp={COMP[tab]} price={price} alloc={alloc} vatMode={vatMode} />}
    </div>
    <div className="pagefoot"></div>
  </div>;
}

function Equiv({ credits, alloc, dur, setDur, open, toggle }) {
  return <div className="stickyhead"><table>
    <thead><tr><th className="l">Action</th><th>Crédits / action</th>
      {PLAN_KEYS.map((k) => <th key={k}>{PLAN_LABEL[k]}<div className="sub2">{fInt(alloc[k])} cr.</div></th>)}</tr></thead>
    <tbody>
      {SECTIONS.map((sec) => <Fragment key={sec.id}>
        <SecHeader sec={sec} open={open[sec.id]} onToggle={() => toggle(sec.id)} dur={dur} setDur={setDur} colSpan={6} />
        {open[sec.id] && CAT.filter((c) => c.sec === sec.id).map((c) => <tr key={c.f}>
          <td className="l">{c.label}</td><td className="mono">{fInt(credits[c.f])}</td>
          {PLAN_KEYS.map((k) => <td key={k} className="mono" style={{color:"#475569"}}>{fInt(Math.floor(alloc[k] / credits[c.f]))}</td>)}
        </tr>)}
      </Fragment>)}
    </tbody>
  </table></div>;
}

function pctClass(p) { return p <= 1 ? "ok" : p <= 1.5 ? "warn" : "over"; }
function verdict(total, alloc) {
  if (total <= alloc.E) return { t: "Plan minimum : Essential", c: "#2563eb" };
  if (total <= alloc.P) return { t: "Plan minimum : Premium", c: "#2563eb" };
  if (total <= alloc.S) return { t: "Plan minimum : Studio", c: "#2563eb" };
  return { t: "Dépasse Studio", c: "#e11d48" };
}
function Scenarios({ credits, qty, setQ, totals, alloc, dur, setDur, open, toggle, resetQty }) {
  const ncol = 2 + SCEN.length;
  return <div>
    <p className="scards-intro">Chaque panier correspond à un profil d'usage type, les consommations étant modifiables. Permet de matcher les profils avec les plans.</p>
    <div className="scards">{SCEN.map((s, i) => { const v = verdict(totals[i], alloc);
      return <div className="scard" key={s.k}>
        <div className="t">{s.label}</div>
        <div className="sdesc">{s.desc}</div>
        <div className="v">{fInt(totals[i])} <span className="vu2">cr/mois</span></div>
        <div className="vd" style={{ color: v.c }}>{v.t}</div>
      </div>; })}
    </div>
    <div className="stickyhead"><table>
      <thead><tr><th className="l sticky-l">Action <button className="resetbtn" onClick={resetQty} title="Remettre toutes les quantités au scénario de base"><IcReset style={{width:12,height:12}}/> Réinitialiser</button></th><th>Cr./action</th>
        {SCEN.map((s) => <th key={s.k}>{s.label}</th>)}</tr></thead>
      <tbody>
        {SECTIONS.map((sec) => <Fragment key={sec.id}>
          <SecHeader sec={sec} open={open[sec.id]} onToggle={() => toggle(sec.id)} dur={dur} setDur={setDur} colSpan={ncol} />
          {open[sec.id] && CAT.filter((c) => c.sec === sec.id).map((c) => <tr key={c.f}>
            <td className="l sticky-l">{c.label}</td><td className="mono" style={{color:"#94a3b8"}}>{fInt(credits[c.f])}</td>
            {SCEN.map((s, i) => <td key={s.k}><input className={"qty " + (qty[c.f][i] > 0 ? "pos" : "zero")} type="number" value={qty[c.f][i]} onChange={(e) => setQ(c.f, i, e.target.value)} /></td>)}
          </tr>)}
        </Fragment>)}
      </tbody>
      <tfoot>
        <tr className="tot"><td className="l sticky-l">Total crédits / mois consommés</td><td></td>
          {totals.map((t, i) => <td key={i} className="mono">{fInt(t)}</td>)}</tr>
        <tr>
          <td className="footlabel sticky-l" style={{background:"#f1f5f9"}}>Remplissage du quota mensuel par plan</td>
          <td className="profcell"></td>
          {SCEN.map((s, i) => <td key={s.k} className="profcell">{SCEN_SHORT[i]}</td>)}
        </tr>
        {[["E","Essential"],["P","Premium"],["S","Studio"]].map(([k,lab]) => <tr key={k}>
          <td className="l sticky-l" style={{fontSize:12}}>{lab} <span className="mono" style={{color:"#94a3b8"}}>({fInt(alloc[k])} cr)</span></td><td className="gcol"></td>
          {totals.map((t,i) => { const p = t / alloc[k]; return <td key={i} className={"pct " + pctClass(p)}>{fPct(p)}</td>; })}
        </tr>)}
      </tfoot>
    </table></div>
    <p className="legend">Remplissage = part du quota mensuel du plan consommée par le panier. Vert : tient dans le plan (≤ 100 %). Ambre : dépasse jusqu'à 150 %. Rouge : au-delà.</p>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
